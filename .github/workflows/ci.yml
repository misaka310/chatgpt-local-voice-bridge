name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  extension-e2e:
    name: Mock extension E2E
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install Python test dependencies
        run: python -m pip install packaging numpy PySide6==6.11.1

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Verify Python GUI test runtime
        shell: pwsh
        run: |
          $env:PYTHONPATH = "local-api"
          $env:QT_QPA_PLATFORM = "offscreen"
          python -c "import sys; print(sys.executable); import tray_controller; print('PySide6 tray import OK')"

      - name: Run local-only config tests and mock extension E2E
        shell: pwsh
        run: |
          $env:PYTHON = (Get-Command python).Source
          $env:QT_QPA_PLATFORM = "offscreen"
          npm run test:ci
