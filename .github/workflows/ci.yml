name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  extension-e2e:
    name: Mock extension E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install Python test dependencies
        run: python -m pip install packaging numpy PySide6==6.11.1

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install Qt runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y libegl1

      - name: Verify Python GUI test runtime
        env:
          QT_QPA_PLATFORM: offscreen
        run: PYTHONPATH=local-api python -c "import sys; print(sys.executable); import tray_controller; print('PySide6 tray import OK')"

      - name: Run local-only config tests and mock extension E2E
        run: PYTHON="${pythonLocation}/bin/python" QT_QPA_PLATFORM=offscreen xvfb-run -a npm run test:ci
