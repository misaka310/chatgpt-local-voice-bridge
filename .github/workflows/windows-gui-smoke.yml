name: Windows GUI smoke

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: windows-gui-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tray-ui-smoke:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Adapt Qt popup discovery for hosted Windows
        shell: powershell
        run: |
          $path = 'tests/windows/tray_uia_smoke.py'
          $content = [IO.File]::ReadAllText($path)
          $old = @'
          def find_qt_popup(pid: int) -> WindowInfo | None:
              return next(
                  (
                      row
                      for row in enum_top_windows()
                      if row.pid == pid and row.title == APP_NAME and "QWindowPopup" in row.class_name
                  ),
                  None,
              )
          '@.Replace("          ", "")
          $new = @'
          def find_qt_popup(pid: int) -> WindowInfo | None:
              desktop = Desktop(backend="uia")
              for row in enum_top_windows():
                  if row.pid != pid or not USER32.IsWindowVisible(row.hwnd):
                      continue
                  try:
                      wrapper = desktop.window(handle=row.hwnd)
                      names = {
                          item.window_text().strip()
                          for item in wrapper.descendants(control_type="MenuItem")
                      }
                  except Exception:
                      continue
                  if "Exit" in names and "Restart Voice Bridge" in names:
                      return row
              return None
          '@.Replace("          ", "")
          if (-not $content.Contains($old)) {
            throw 'Expected Qt popup discovery function was not found.'
          }
          [IO.File]::WriteAllText($path, $content.Replace($old, $new), [Text.UTF8Encoding]::new($false))

      - name: Run packaged tray GUI smoke
        shell: powershell
        run: npm run test:gui:windows

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-gui-smoke-${{ github.run_id }}
          path: test-results/windows-gui-smoke
          if-no-files-found: ignore
          retention-days: 14
