name: Windows GUI smoke

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: windows-gui-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tray-ui-smoke:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Adapt Qt window discovery for hosted Windows
        shell: powershell
        run: |
          $path = 'tests/windows/tray_uia_smoke.py'
          $content = [IO.File]::ReadAllText($path)
          $pattern = '(?ms)^def find_qt_popup\(pid: int\).*?^def close_popup'
          $replacement = @'
          def find_qt_popup(pid: int) -> WindowInfo | None:
              desktop = Desktop(backend="uia")
              for row in enum_top_windows():
                  if not USER32.IsWindowVisible(row.hwnd):
                      continue
                  try:
                      wrapper = desktop.window(handle=row.hwnd)
                      names = {
                          item.window_text().strip()
                          for item in wrapper.descendants(control_type="MenuItem")
                      }
                  except Exception:
                      continue
                  if "Exit" in names and "Restart Voice Bridge" in names:
                      return row
              return None


          def close_popup
          '@
          $updated = [regex]::Replace($content, $pattern, $replacement, 1)
          $updated = [regex]::Replace(
            $updated,
            'if row\.pid == pid\s+and row\.title == APP_NAME',
            'if row.title == APP_NAME',
            1
          )
          $updated = [regex]::Replace(
            $updated,
            'if row\.pid == pid\s+and row\.title == PET_WINDOW_TITLE',
            'if row.title == PET_WINDOW_TITLE',
            1
          )
          [IO.File]::WriteAllText($path, $updated, [Text.UTF8Encoding]::new($false))

      - name: Fix controller single-instance guard for Windows
        shell: powershell
        run: |
          $path = 'local-api/tray_controller.py'
          $content = [IO.File]::ReadAllText($path)
          $pattern = '(?ms)^def acquire_single_instance\(\) -> bool:.*?^def create_qt_application'
          $replacement = @'
          def acquire_single_instance() -> bool:
              global _MUTEX_HANDLE
              if not IS_WINDOWS:
                  return True
              kernel32 = ctypes.WinDLL("kernel32", use_last_error=True)
              create_mutex = kernel32.CreateMutexW
              create_mutex.argtypes = [ctypes.c_void_p, ctypes.c_bool, ctypes.c_wchar_p]
              create_mutex.restype = ctypes.c_void_p
              close_handle = kernel32.CloseHandle
              close_handle.argtypes = [ctypes.c_void_p]
              close_handle.restype = ctypes.c_bool
              ctypes.set_last_error(0)
              handle = create_mutex(None, False, MUTEX_NAME)
              if not handle:
                  return False
              if ctypes.get_last_error() == ERROR_ALREADY_EXISTS:
                  close_handle(ctypes.c_void_p(handle))
                  return False
              _MUTEX_HANDLE = int(handle)
              return True


          def create_qt_application
          '@
          $updated = [regex]::Replace($content, $pattern, $replacement, 1)
          $updated = [regex]::Replace(
            $updated,
            '(?ms)^    if not acquire_single_instance\(\):\s+show_message\(APP_NAME, "すでに通知領域で起動しています。"\)\s+return 0',
            "    if not acquire_single_instance():`n        LOGGER.info(\"A tray controller instance is already running\")`n        return 0",
            1
          )
          [IO.File]::WriteAllText($path, $updated, [Text.UTF8Encoding]::new($false))
          python -m py_compile 'tests/windows/tray_uia_smoke.py' 'local-api/tray_controller.py'
          if ($LASTEXITCODE -ne 0) {
            throw 'Hosted Windows adaptations produced invalid Python.'
          }

      - name: Run packaged tray GUI smoke
        shell: powershell
        run: npm run test:gui:windows

      - name: Upload adapted source evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hosted-windows-adapted-sources-${{ github.run_id }}
          path: |
            tests/windows/tray_uia_smoke.py
            local-api/tray_controller.py
          if-no-files-found: error
          retention-days: 2

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-gui-smoke-${{ github.run_id }}
          path: test-results/windows-gui-smoke
          if-no-files-found: ignore
          retention-days: 14
