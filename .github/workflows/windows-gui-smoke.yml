name: Windows GUI smoke

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: windows-gui-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tray-ui-smoke:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Adapt Qt UI discovery for hosted Windows
        shell: powershell
        run: |
          $path = 'tests/windows/tray_uia_smoke.py'
          $content = [IO.File]::ReadAllText($path)

          $popupPattern = '(?ms)^def find_qt_popup\(pid: int\).*?^def close_popup'
          $popupReplacement = @'
          def find_qt_popup(pid: int) -> WindowInfo | None:
              desktop = Desktop(backend="uia")
              for row in enum_top_windows():
                  if not USER32.IsWindowVisible(row.hwnd):
                      continue
                  try:
                      wrapper = desktop.window(handle=row.hwnd)
                      names = {
                          item.window_text().strip()
                          for item in wrapper.descendants(control_type="MenuItem")
                      }
                  except Exception:
                      continue
                  if "Exit" in names and "Restart Voice Bridge" in names:
                      return row
              return None


          def close_popup
          '@
          $updated = [regex]::Replace($content, $popupPattern, $popupReplacement, 1)
          $updated = [regex]::Replace(
            $updated,
            'if row\.pid == pid\s+and row\.title == APP_NAME',
            'if row.title == APP_NAME',
            1
          )
          $updated = [regex]::Replace(
            $updated,
            'if row\.pid == pid\s+and row\.title == PET_WINDOW_TITLE',
            'if row.title == PET_WINDOW_TITLE',
            1
          )

          $singlePattern = '(?ms)^def assert_single_instance\(original_pid: int\).*?^def candidate_scopes'
          $singleReplacement = @'
          def assert_single_instance(original_pid: int) -> None:
              completed = subprocess.run([str(EXE)], cwd=ROOT, timeout=15, check=False)
              if completed.returncode != 0:
                  raise RuntimeError(f"second launcher returned {completed.returncode}")

              def duplicate_dialog_windows():
                  rows = [
                      row
                      for row in enum_top_windows()
                      if row.pid != original_pid
                      and row.title == APP_NAME
                      and row.class_name == "#32770"
                      and USER32.IsWindowVisible(row.hwnd)
                  ]
                  return rows or None

              dialogs = wait_until(
                  "duplicate-instance information dialog",
                  duplicate_dialog_windows,
                  timeout=10,
              )
              desktop = Desktop(backend="uia")
              for row in dialogs:
                  dialog = desktop.window(handle=row.hwnd)
                  ok_button = dialog.child_window(title="OK", control_type="Button")
                  if not ok_button.exists(timeout=2):
                      raise AssertionError("duplicate-instance dialog has no OK button")
                  ok_button.click_input()

              def original_is_only_controller():
                  pids = [process.pid for process in controller_processes()]
                  return pids == [original_pid]

              wait_until(
                  "duplicate controller to exit after OK",
                  original_is_only_controller,
                  timeout=15,
              )


          def candidate_scopes
          '@
          $updated = [regex]::Replace($updated, $singlePattern, $singleReplacement, 1)
          if ($updated -eq $content) {
            throw 'Expected hosted-Windows test adaptations were not applied.'
          }
          [IO.File]::WriteAllText($path, $updated, [Text.UTF8Encoding]::new($false))
          python -m py_compile $path
          if ($LASTEXITCODE -ne 0) {
            throw 'Hosted Windows test adaptation produced invalid Python.'
          }

      - name: Run packaged tray GUI smoke
        shell: powershell
        run: npm run test:gui:windows

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-gui-smoke-${{ github.run_id }}
          path: test-results/windows-gui-smoke
          if-no-files-found: ignore
          retention-days: 14
